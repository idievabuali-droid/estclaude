<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Вафо favicon. A single Cyrillic В glyph in serif on a warm stone-50
    surface, in terracotta-700 — the same brand colours used across the
    rest of the platform. Renders identically on light + dark browser
    chrome because we draw our own background rather than rely on
    transparent tinting.
  -->
  <rect width="64" height="64" rx="12" ry="12" fill="#f5f5f4" />
  <text
    x="32"
    y="46"
    text-anchor="middle"
    font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
    font-size="44"
    font-weight="600"
    fill="#9a3412"
    letter-spacing="0.005em"
  >В</text>
</svg>
