<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Vafo.tj favicon. A single Latin V glyph in serif on a warm stone-50
    surface, in terracotta-700 — the same brand colours used across the
    rest of the platform. The full "Vafo.tj" wordmark is too dense for a
    16px favicon, so we use just the letter mark; the full wordmark
    appears in the header, OG image, and tab title.
  -->
  <rect width="64" height="64" rx="12" ry="12" fill="#f5f5f4" />
  <text
    x="32"
    y="48"
    text-anchor="middle"
    font-family="'Source Serif 4', 'Source Serif Pro', Georgia, 'Times New Roman', serif"
    font-size="48"
    font-weight="600"
    fill="#9a3412"
    letter-spacing="0.005em"
  >V</text>
</svg>
